apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: penguin-rust

bases:
  - ../../base

# Production: pin to specific epoch tag or SHA256 digest
# Example: kustomize edit set image ghcr.io/penguinztech/penguin-rust-base:1747123456
images:
  - name: ghcr.io/penguinztech/penguin-rust-base
    newTag: latest   # override with immutable tag before deploying to prod

patches:
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: rust-server
      spec:
        type: LoadBalancer
  - path: resources-patch.yaml
    target:
      kind: Deployment
      name: rust-server
  - path: pvc-patch.yaml
    target:
      kind: PersistentVolumeClaim
      name: rust-server-data
