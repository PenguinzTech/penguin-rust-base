apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: penguin-rust

bases:
  - ../../base

# Set image tag via: kustomize edit set image ghcr.io/penguinztech/penguin-rust-base:beta-<epoch>
# or override with --set-image flag in deploy-beta.sh
images:
  - name: ghcr.io/penguinztech/penguin-rust-base
    newTag: latest

patches:
  # LoadBalancer service for real game traffic
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: rust-server
      spec:
        type: LoadBalancer
  # Beta-specific config
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: rust-server-config
      data:
        RUST_SERVER_NAME: "Rust Beta Server"
