name: Security Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly on Sundays at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  # Lint Dockerfile for security issues and best practices
  # Catches base image vulnerabilities, insecure patterns, rootless violations
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: warning

  # Lint shell scripts for syntax and security issues
  # Checks for unquoted variables, unsafe patterns, shellcheck violations
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -x --source-path=docker docker/start.sh
          shellcheck -x docker/lib-functions.sh
          shellcheck -x --source-path=docker docker/check-plugin-updates.sh
          shellcheck -x --source-path=docker docker/wipe-check.sh

  # Scan repo for hardcoded secrets, API keys, credentials
  # Scans all files except .cs plugins (third-party, not our code)
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@bf2dc8e55639c1e091e9b45970152e4313705814

  # Scan IaC (Dockerfiles, shell scripts) for security violations
  # Uses Checkov to check Docker security practices (CKV_DOCKER_* only)
  # Excludes .cs plugin files (third-party code, not our responsibility)
  iac-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Scan IaC with Checkov (Docker checks only)
        uses: bridgecrewio/checkov-action@de2bfaecd21d58ef232e0d2a3391c33c32c460d7
        with:
          directory: docker/
          check: CKV_DOCKER_1,CKV_DOCKER_2,CKV_DOCKER_3,CKV_DOCKER_4,CKV_DOCKER_5,CKV_DOCKER_6,CKV_DOCKER_7,CKV_DOCKER_8,CKV_DOCKER_9,CKV_DOCKER_10,CKV_DOCKER_11,CKV_DOCKER_12,CKV_DOCKER_13,CKV_DOCKER_14,CKV_DOCKER_15,CKV_DOCKER_16,CKV_DOCKER_17,CKV_DOCKER_18,CKV_DOCKER_19,CKV_DOCKER_20,CKV_DOCKER_21,CKV_DOCKER_22
          soft-fail: false

  # Scan built Docker image for vulnerability findings (CRITICAL, HIGH severity only)
  # Only runs on schedule/manual dispatch — the image must already be built and
  # pushed to GHCR (handled by build-image.yml on push to main). Running on push
  # here would race the build workflow and fail with MANIFEST_UNKNOWN.
  trivy-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Normalize image name to lowercase
        id: image
        env:
          RAW_IMAGE_NAME: ${{ github.repository }}
        run: echo "lower=${RAW_IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@264c9c5e188ea085e7377fd77abd17bfbd4e5926
        with:
          image-ref: ghcr.io/${{ steps.image.outputs.lower }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8339b9254eca5409ae8a480f4146a72e9ebb21a7
        if: always()
        with:
          sarif_file: trivy-results.sarif
